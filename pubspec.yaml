name: baladeyate
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dartz: ^0.10.1
  infinite_scroll_pagination: ^5.1.1
  responsive_x_toolkit: ^1.0.5
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  get_it: ^8.3.0
  equatable: ^2.0.8
  shared_preferences: ^2.5.5
  freezed_annotation: ^3.1.0
  google_fonts: ^6.3.3
  flutter_animate: ^4.5.2
  hydrated_bloc: ^10.1.1
  go_router: ^17.2.3
  path_provider: ^2.1.5
  flutter_svg: ^2.3.0
  google_maps_flutter: ^2.4.0
  geolocator: ^14.0.2
  lottie: ^3.3.3
  device_preview: ^1.3.0
  video_player: ^2.10.0
  w_builder: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Alyamama
      fonts:
        - asset: assets/fonts/Alyamama-Light.ttf
          weight: 300
        - asset: assets/fonts/Alyamama-Regular.ttf
          weight: 400
        - asset: assets/fonts/Alyamama-Medium.ttf
          weight: 500
        - asset: assets/fonts/Alyamama-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Alyamama-Bold.ttf
          weight: 700
        - asset: assets/fonts/Alyamama-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Alyamama-Black.ttf
          weight: 900
